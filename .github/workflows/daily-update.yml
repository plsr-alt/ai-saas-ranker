name: Daily Ranking Update

on:
  schedule:
    - cron: '0 21 * * *'  # 6:00 AM JST daily
  workflow_dispatch:  # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect mention data
        working-directory: ..
        run: |
          python site/../scripts/collect_mentions.py || python ../scripts/collect_mentions.py || echo "Script path issue, skipping"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx next build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || {
            git commit -m "chore: daily ranking update $(date +%Y-%m-%d)"
            git push
          }
